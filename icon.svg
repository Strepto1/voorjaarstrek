<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#040d1a"/>
      <stop offset="0.55" stop-color="#1a3a5c"/>
      <stop offset="0.82" stop-color="#c4703a"/>
      <stop offset="1"    stop-color="#f0c060"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="88%" r="22%">
      <stop offset="0"   stop-color="#fff7d6"/>
      <stop offset="0.5" stop-color="#f0c060"/>
      <stop offset="1"   stop-color="#c4703a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#sky)"/>
  <circle cx="256" cy="440" r="90" fill="url(#sun)" opacity="0.85"/>
  <!-- Leading bird -->
  <g transform="translate(256,210)" fill="none" stroke="#f0c060" stroke-width="9" stroke-linecap="round">
    <path d="M0,0 Q-38,-26 -72,-14"/>
    <path d="M0,0 Q38,-26 72,-14"/>
  </g>
  <!-- Left bird -->
  <g transform="translate(148,168)" fill="none" stroke="#e8a84c" stroke-width="7" stroke-linecap="round">
    <path d="M0,0 Q-28,-18 -52,-10"/>
    <path d="M0,0 Q28,-18 52,-10"/>
  </g>
  <!-- Right bird -->
  <g transform="translate(364,172)" fill="none" stroke="#e8a84c" stroke-width="7" stroke-linecap="round">
    <path d="M0,0 Q-28,-18 -52,-10"/>
    <path d="M0,0 Q28,-18 52,-10"/>
  </g>
  <!-- Far left -->
  <g transform="translate(72,198)" fill="none" stroke="#c4703a" stroke-width="5" stroke-linecap="round">
    <path d="M0,0 Q-18,-12 -34,-6"/>
    <path d="M0,0 Q18,-12 34,-6"/>
  </g>
  <!-- Far right -->
  <g transform="translate(440,204)" fill="none" stroke="#c4703a" stroke-width="5" stroke-linecap="round">
    <path d="M0,0 Q-18,-12 -34,-6"/>
    <path d="M0,0 Q18,-12 34,-6"/>
  </g>
</svg>
